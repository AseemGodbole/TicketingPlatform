<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details Received</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .card {
            background-color: #2b2b2b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #3a3a3a;
            max-width: 400px;
        }

        h2 {
            color: #2ecc71;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 10px 25px;
            background-color: transparent;
            border: 1px solid #777;
            color: #ddd;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            border-color: #fff;
            color: #fff;
            background-color: #333;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>✅ Details Received</h2>

        <p style="font-size: 18px; color: white;">Thank you for your support.</p>

        <p>We have noted your contact details.</p>
        <p>We will reach out to you personally regarding our upcoming performance schedule.</p>

        <a href="/" class="btn">Return to Home</a>
    </div>
</body>

</html>
